<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     role="img"
     aria-labelledby="title">
    <title id="title">Calendar</title>

    <g fill="none"
       stroke="#0ea5a4"
       stroke-width="2.5"
       stroke-linecap="round"
       stroke-linejoin="round">

        <!-- Calendar body -->
        <rect x="10" y="14"
              width="44"
              height="40"
              rx="8"/>

        <!-- Header divider -->
        <line x1="10" y1="24" x2="54" y2="24"/>

        <!-- Binding rings -->
        <line x1="22" y1="10" x2="22" y2="18"/>
        <line x1="42" y1="10" x2="42" y2="18"/>

        <!-- Grid dots -->
        <circle cx="22" cy="34" r="1.5"/>
        <circle cx="32" cy="34" r="1.5"/>
        <circle cx="42" cy="34" r="1.5"/>

        <circle cx="22" cy="44" r="1.5"/>
        <circle cx="32" cy="44" r="1.5"/>
        <circle cx="42" cy="44" r="1.5"/>

    </g>
</svg>
